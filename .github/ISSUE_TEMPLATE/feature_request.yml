name: Feature Request
description: Suggest an Idea, Improvement, or New Capability.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Take a look at `docs/architecture.md` and `docs/decisions.md` first — it might
        already be planned, or there might be context on why something works the way it does.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's missing, confusing, or frustrating today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
